<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Viewpoint</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

/* ---------- theme variables (light default) ---------- */
:root{
--bg-page:#F5F4EE;
--bg-surface:#FFFFFF;
--bg-surface-alt:#F8FAF7;
--border:#D8DDD7;
--border-soft:#E7ECE7;
--border-soft2:#E3E8E3;
--text-primary:#24332A;
--text-secondary:#66736A;
--text-tertiary:#9AA39C;
--text-tertiary2:#8A968D;
--text-footer:#7A867E;
--text-menu:#3A4A3F;
--accent:#2F855A;
--accent-light:#EDF7F0;
--accent-bright:#68D391;
--accent-mid:#4A8F69;
--danger-bg:#FDEEEE;
--danger:#B8503F;
--debate-bg:#FDEEE4;
--debate-color:#B8623F;
--top-bg:#F7FCF9;
--progress-bg:#DCE6DC;
--cancel-hover:#B8B8B8;
--overlay-bg:rgba(20,30,24,.45);
--shadow-card:rgba(0,0,0,.08);
--shadow-btn:rgba(47,133,90,.18);
color-scheme:light;
}

/* ---------- dark theme overrides ---------- */
[data-theme="dark"]{
--bg-page:#141B17;
--bg-surface:#1C2521;
--bg-surface-alt:#20302A;
--border:#33443A;
--border-soft:#2A3A32;
--border-soft2:#2E3F36;
--text-primary:#E8EDE9;
--text-secondary:#A6B3AB;
--text-tertiary:#7C8B82;
--text-tertiary2:#8CA093;
--text-footer:#7C8B82;
--text-menu:#D3DED8;
--accent:#48BB86;
--accent-light:#1F3229;
--accent-bright:#68D391;
--accent-mid:#5FB088;
--danger-bg:#3A2323;
--danger:#E08877;
--debate-bg:#3A2B1E;
--debate-color:#E29868;
--top-bg:#1C2A22;
--progress-bg:#2C3B32;
--cancel-hover:#4A5A50;
--overlay-bg:rgba(0,0,0,.6);
--shadow-card:rgba(0,0,0,.35);
--shadow-btn:rgba(72,187,134,.22);
color-scheme:dark;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

html{
background:var(--bg-page);
height:100%;
}

body{
background:var(--bg-page);
color:var(--text-primary);
min-height:100vh;
min-height:100dvh;
overscroll-behavior-y:none;
-webkit-tap-highlight-color:transparent;
transition:background .25s, color .25s;
}

#root{
background:var(--bg-page);
min-height:100vh;
min-height:100dvh;
}

button{cursor:pointer;font-family:'Inter',sans-serif;}
button:focus-visible, input:focus-visible, textarea:focus-visible, select:focus-visible{
outline:2px solid var(--accent);outline-offset:2px;
}

button, .card, [data-open], .trend, .vote-arrow{
-webkit-tap-highlight-color:transparent;
touch-action:manipulation;
}

header{

min-height:75px;
background:var(--bg-surface);

border-bottom:1px solid var(--border);

display:flex;
justify-content:space-between;
align-items:center;

padding:0 55px;
padding-top:env(safe-area-inset-top);

position:sticky;
top:0;
z-index:20;

}

.logo{

font-size:30px;
font-weight:800;
color:var(--accent);
cursor:pointer;

}

nav{

display:flex;
gap:15px;
overflow-x:auto;
-webkit-overflow-scrolling:touch;
scrollbar-width:none;

}

.header-nav-group{
display:flex;
align-items:center;
gap:22px;
min-width:0;
}

nav::-webkit-scrollbar{display:none;}

nav button{

background:none;
border:none;

padding:11px 18px;

border-radius:12px;

font-size:15px;

color:var(--text-secondary);

transition:.25s;

white-space:nowrap;
flex-shrink:0;

}

@media (hover:hover) and (pointer:fine){
nav button:hover{
background:var(--accent-light);
color:var(--accent);
}
}

.active{

background:var(--accent);

color:white;

font-weight:700;

}

/* ---------- header right: theme toggle, notifications, auth ---------- */
.header-right{
display:flex;
align-items:center;
gap:10px;
flex-shrink:0;
}

.icon-btn{
background:none;
border:1px solid var(--border);
color:var(--text-secondary);
width:40px;
height:40px;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
font-size:18px;
flex-shrink:0;
transition:.2s;
}
@media (hover:hover) and (pointer:fine){
.icon-btn:hover{border-color:var(--accent);color:var(--accent);}
}

.notif-wrap{position:relative;}
.notif-badge{
position:absolute;
top:-4px;
right:-4px;
background:var(--danger);
color:white;
font-size:10.5px;
font-weight:800;
min-width:17px;
height:17px;
border-radius:999px;
display:flex;
align-items:center;
justify-content:center;
padding:0 4px;
line-height:1;
}
.notif-dropdown{
display:none;
position:absolute;
top:calc(100% + 8px);
right:0;
background:var(--bg-surface);
border:1px solid var(--border);
border-radius:16px;
box-shadow:0 18px 40px var(--shadow-card);
width:340px;
max-width:calc(100vw - 32px);
max-height:420px;
overflow-y:auto;
z-index:40;
}
.notif-dropdown.open{display:block;}
.notif-head{
padding:14px 16px;
border-bottom:1px solid var(--border-soft);
font-weight:700;
font-size:14px;
color:var(--text-primary);
display:flex;
justify-content:space-between;
align-items:center;
}
.notif-head button{
background:none;
border:none;
color:var(--accent);
font-size:12.5px;
font-weight:700;
}
.notif-item{
padding:12px 16px;
border-bottom:1px solid var(--border-soft);
font-size:13px;
color:var(--text-primary);
line-height:1.5;
cursor:pointer;
}
.notif-item:last-child{border-bottom:none;}
.notif-item.unread{background:var(--accent-light);}
@media (hover:hover) and (pointer:fine){
.notif-item:hover{background:var(--bg-surface-alt);}
}
.notif-item .notif-time{
display:block;
color:var(--text-tertiary);
font-size:11.5px;
margin-top:3px;
}
.notif-empty{
padding:30px 16px;
text-align:center;
color:var(--text-tertiary);
font-size:13px;
}

.auth-wrap{position:relative;}
.auth-buttons{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.signin-btn{
display:flex;
align-items:center;
gap:8px;
background:var(--bg-surface);
border:1px solid var(--border);
color:var(--text-primary);
padding:9px 16px;
border-radius:12px;
font-weight:700;
font-size:14px;
white-space:nowrap;
}
@media (hover:hover) and (pointer:fine){
.signin-btn:hover{border-color:var(--accent);}
}
.signin-btn.primary{
background:var(--accent);
border-color:var(--accent);
color:#fff;
}
@media (hover:hover) and (pointer:fine){
.signin-btn.primary:hover{background:var(--accent-mid);border-color:var(--accent-mid);}
}
.avatar-btn{
display:flex;
align-items:center;
gap:8px;
background:none;
border:1px solid var(--border);
padding:5px 12px 5px 5px;
border-radius:999px;
}
@media (hover:hover) and (pointer:fine){
.avatar-btn:hover{border-color:var(--accent);}
}
.avatar-img{
width:30px;
height:30px;
border-radius:999px;
object-fit:cover;
background:var(--accent-light);
}
.avatar-fallback{
width:30px;
height:30px;
border-radius:999px;
background:var(--accent);
color:white;
display:flex;
align-items:center;
justify-content:center;
font-size:13px;
font-weight:800;
}
.avatar-name{font-size:13.5px;font-weight:600;color:var(--text-primary);}
.user-dropdown{
display:none;
position:absolute;
top:calc(100% + 8px);
right:0;
background:var(--bg-surface);
border:1px solid var(--border);
border-radius:14px;
box-shadow:0 18px 40px var(--shadow-card);
min-width:200px;
overflow:hidden;
z-index:40;
}
.user-dropdown.open{display:block;}
.user-dropdown .ud-info{padding:14px 16px;border-bottom:1px solid var(--border-soft);}
.user-dropdown .ud-name{font-weight:700;font-size:14px;color:var(--text-primary);}
.user-dropdown .ud-email{font-size:12px;color:var(--text-tertiary);margin-top:2px;}
.user-dropdown button.menu-item{width:100%;}

/* ---------- report / edit modal extras ---------- */
.report-btn{
background:none;
border:1px solid var(--border);
color:var(--text-tertiary2);
padding:8px 13px;
border-radius:999px;
font-size:12.5px;
font-weight:600;
display:inline-flex;
align-items:center;
gap:5px;
}
@media (hover:hover) and (pointer:fine){
.report-btn:hover{border-color:var(--danger);color:var(--danger);}
}
.auth-required-note{
font-size:12.5px;
color:var(--text-tertiary);
margin-top:10px;
}
.posting-as{
font-size:12.5px;
color:var(--text-tertiary);
margin-bottom:10px;
}

/* ---------- @mention tagging ---------- */
.mention-tag{
color:var(--accent);
font-weight:700;
}
.mention-dropdown{
position:fixed;
display:none;
background:var(--bg-surface);
border:1px solid var(--border);
border-radius:12px;
box-shadow:0 12px 28px var(--shadow-card);
max-height:220px;
overflow-y:auto;
z-index:200;
min-width:180px;
}
.mention-suggestion{
padding:9px 13px;
font-size:13.5px;
color:var(--text-primary);
cursor:pointer;
}
@media (hover:hover) and (pointer:fine){
.mention-suggestion:hover{background:var(--bg-surface-alt);}
}
.modal select#reportReason{
width:100%;
padding:13px 14px;
border-radius:14px;
border:1px solid var(--border);
font-size:14px;
outline:none;
background:var(--bg-surface);
color:var(--text-primary);
}

.wrapper{

background:var(--bg-page);
max-width:1300px;

margin:auto;

padding:35px;

display:grid;

grid-template-columns:270px 1fr 290px;

gap:25px;

}

.sidebar{

background:var(--bg-surface);

border:1px solid var(--border);

border-radius:22px;

padding:22px;

height:fit-content;

}

.sidebar h3{

margin-bottom:18px;

}

.sidebar button{

width:100%;

padding:14px;

margin-bottom:12px;

background:var(--accent);

color:white;

font-weight:700;

border:none;

border-radius:14px;

transition:.25s;

}

@media (hover:hover) and (pointer:fine){
.sidebar button:hover{

transform:translateY(-2px);

box-shadow:0 12px 25px var(--shadow-btn);

}
}

.sidebar button.ghost{
background:var(--accent-light);
color:var(--accent);
}

.search{

margin-bottom:25px;

}

.search input{

width:100%;

padding:15px;

border-radius:16px;

border:1px solid var(--border);

background:var(--bg-surface);

outline:none;

font-size:15px;

color:var(--text-primary);

}

.feed{

display:flex;

flex-direction:column;

gap:22px;

}

.card{

background:var(--bg-surface);

border:1px solid var(--border);

border-radius:22px;

padding:25px;

transition:.25s;

cursor:pointer;

}

@media (hover:hover) and (pointer:fine){
.card:hover{

transform:translateY(-5px);

box-shadow:0 18px 35px var(--shadow-card);

border-color:var(--accent-bright);

}
}

.tag{

display:inline-block;

padding:6px 13px;

border-radius:999px;

background:var(--accent-light);

color:var(--accent);

font-size:13px;

font-weight:700;

margin-bottom:18px;

}

.tag.debate-tag{
background:var(--debate-bg);
color:var(--debate-color);
}

.card-top-row{
display:flex;
align-items:flex-start;
justify-content:space-between;
gap:10px;
margin-bottom:12px;
}
.card-top-row .tag{margin-bottom:0;}
.card-author{
font-size:12.5px;
color:var(--text-tertiary2);
margin-bottom:14px;
}

.menu-wrap{
position:relative;
}
.menu-btn{
background:none;
border:1px solid var(--border);
color:var(--text-secondary);
width:32px;
height:32px;
border-radius:999px;
font-size:16px;
line-height:1;
display:flex;
align-items:center;
justify-content:center;
}
@media (hover:hover) and (pointer:fine){
.menu-btn:hover{border-color:var(--accent);color:var(--accent);}
}
.menu-dropdown{
display:none;
position:absolute;
top:calc(100% + 6px);
right:0;
background:var(--bg-surface);
border:1px solid var(--border);
border-radius:12px;
box-shadow:0 12px 28px var(--shadow-card);
min-width:150px;
overflow:hidden;
z-index:30;
}
.menu-dropdown.open{display:block;}
.menu-item{
display:block;
width:100%;
text-align:left;
padding:11px 14px;
background:none;
border:none;
font-size:13.5px;
color:var(--text-menu);
font-weight:600;
}
@media (hover:hover) and (pointer:fine){
.menu-item:hover{background:var(--bg-page);}
}
.menu-item.danger{color:var(--danger);}
@media (hover:hover) and (pointer:fine){
.menu-item.danger:hover{background:var(--danger-bg);}
}

.title{

font-size:25px;

font-weight:700;

margin-bottom:12px;

}

.desc{

color:var(--text-secondary);

line-height:1.7;

white-space:pre-line;

margin-bottom:22px;

}

.bottom{

display:flex;

justify-content:space-between;

align-items:center;
flex-wrap:wrap;
gap:12px;

}

.stats{

display:flex;

gap:20px;

font-size:14px;

color:var(--text-secondary);

}

.vote{

background:var(--accent-light);

padding:9px 16px;

border-radius:999px;

color:var(--accent);

font-weight:700;

}

.vote-topic-btn{
background:var(--accent-light);
border:1px solid transparent;
padding:9px 16px;
border-radius:999px;
color:var(--accent);
font-weight:700;
font-size:14px;
display:inline-flex;
align-items:center;
gap:6px;
white-space:nowrap;
}
.vote-topic-btn.voted{background:var(--accent);color:white;}
@media (hover:hover) and (pointer:fine){
.vote-topic-btn:hover{border-color:var(--accent);}
}

.right{

background:var(--bg-surface);

border:1px solid var(--border);

border-radius:22px;

padding:22px;

height:fit-content;

}

.right h3{

margin-bottom:18px;

}

.trend{

padding:14px 0;

border-bottom:1px solid var(--border-soft);

cursor:pointer;

transition:.25s;
display:flex;
justify-content:space-between;
align-items:center;
gap:8px;
font-size:14px;

}

.trend:last-child{border-bottom:none;}

@media (hover:hover) and (pointer:fine){
.trend:hover{

padding-left:12px;

color:var(--accent);

}
}

.trend .tvotes{
font-size:12px;
color:var(--text-tertiary);
white-space:nowrap;
}

.debate{

display:grid;

grid-template-columns:1fr 1fr;

gap:18px;

margin-top:20px;

}

.side{

background:var(--bg-surface-alt);

padding:18px;

border-radius:16px;

border:1px solid var(--border-soft2);

}

.progress{

height:10px;

background:var(--progress-bg);

border-radius:999px;

overflow:hidden;

margin-top:15px;

}

.fill{

height:100%;

background:var(--accent);

}

.fill2{

height:100%;

background:var(--accent-bright);

}

footer{

text-align:center;

padding:35px;

color:var(--text-footer);
font-size:13px;

}

.empty-state{
background:var(--bg-surface);
border:1px dashed var(--border);
border-radius:22px;
padding:50px 25px;
text-align:center;
color:var(--text-secondary);
}

.empty-state .big{
font-size:32px;
margin-bottom:10px;
}

/* ---------- detail view ---------- */

.back-btn{
background:none;
border:none;
color:var(--text-secondary);
font-size:14px;
font-weight:600;
padding:0 0 18px;
display:inline-block;
}
@media (hover:hover) and (pointer:fine){
.back-btn:hover{color:var(--accent);}
}

.detail-card{
background:var(--bg-surface);
border:1px solid var(--border);
border-radius:22px;
padding:32px;
margin-bottom:24px;
}
.detail-card .title{font-size:30px;margin-bottom:14px;}
.detail-meta{
display:flex;
gap:18px;
color:var(--text-secondary);
font-size:14px;
margin-top:10px;
flex-wrap:wrap;
}

.side-heading{
display:flex;
align-items:center;
justify-content:space-between;
margin-bottom:4px;
}
.side-heading h3{font-size:17px;}
.side-pct{font-weight:800;color:var(--accent);}
.side.b .side-pct{color:var(--accent-mid);}

.opinion-form{
background:var(--bg-surface);
border:1px solid var(--border);
border-radius:22px;
padding:22px;
margin-bottom:24px;
}
.opinion-form h4{margin-bottom:14px;font-size:15px;color:var(--text-secondary);}
.opinion-form textarea{
width:100%;
padding:15px;
border-radius:16px;
border:1px solid var(--border);
background:var(--bg-surface-alt);
outline:none;
font-size:15px;
color:var(--text-primary);
resize:vertical;
min-height:80px;
}
.opinion-form-row{
display:flex;
gap:10px;
margin-top:12px;
flex-wrap:wrap;
align-items:center;
}
.opinion-form-row input[type=text]{
flex:1;
min-width:160px;
padding:12px 14px;
border-radius:14px;
border:1px solid var(--border);
font-size:14px;
outline:none;
background:var(--bg-surface);
color:var(--text-primary);
}
.opinion-form-row select{
padding:12px 14px;
border-radius:14px;
border:1px solid var(--border);
font-size:14px;
background:var(--bg-surface);
color:var(--text-primary);
outline:none;
}
.post-btn{
background:var(--accent);
color:white;
border:none;
padding:12px 22px;
border-radius:14px;
font-weight:700;
font-size:14px;
transition:.25s;
}
@media (hover:hover) and (pointer:fine){
.post-btn:hover{transform:translateY(-2px);box-shadow:0 12px 25px var(--shadow-btn);}
}

.opinions-col{display:flex;flex-direction:column;gap:14px;}
.opinions-grid{display:grid;grid-template-columns:1fr 1fr;gap:22px;}

.opinion-item{
background:var(--bg-surface);
border:1px solid var(--border);
border-radius:18px;
padding:18px;
display:flex;
gap:14px;
}
.opinion-item.top{border-color:var(--accent-bright);background:var(--top-bg);}
.opinion-item .vote-col{
display:flex;
flex-direction:column;
align-items:center;
gap:4px;
flex-shrink:0;
width:52px;
}
.vote-arrow{
width:38px;
height:34px;
border-radius:10px;
border:1px solid var(--border);
background:var(--bg-surface-alt);
color:var(--accent);
font-size:16px;
}
@media (hover:hover) and (pointer:fine){
.vote-arrow:hover{border-color:var(--accent);}
}
.vote-arrow.voted{background:var(--accent);color:white;border-color:var(--accent);}
.vote-count{font-weight:800;font-size:15px;color:var(--text-primary);}
.opinion-text{font-size:15px;line-height:1.6;margin-bottom:8px;white-space:pre-line;}
.opinion-author{font-size:12.5px;color:var(--text-tertiary2);}

/* ---------- replies ---------- */
.reply-toggle{
background:none;
border:none;
color:var(--text-tertiary2);
font-size:12.5px;
font-weight:600;
margin-top:8px;
padding:2px 0;
}
@media (hover:hover) and (pointer:fine){
.reply-toggle:hover{color:var(--accent);}
}
.replies-wrap{
margin-top:12px;
padding-left:16px;
border-left:2px solid var(--border-soft);
display:flex;
flex-direction:column;
gap:12px;
}
.reply-item{
font-size:13.5px;
line-height:1.55;
}
.reply-item .reply-text{color:var(--text-primary);white-space:pre-line;}
.reply-item .reply-meta{
display:flex;
gap:10px;
align-items:center;
color:var(--text-tertiary);
font-size:11.5px;
margin-top:4px;
}
.reply-meta button{
background:none;
border:none;
color:var(--text-tertiary);
font-size:11.5px;
font-weight:600;
padding:0;
}
@media (hover:hover) and (pointer:fine){
.reply-meta button:hover{color:var(--danger);}
}
.reply-form{
margin-top:12px;
display:flex;
flex-direction:column;
gap:8px;
}
.reply-form textarea{
width:100%;
min-height:56px;
padding:10px 12px;
border-radius:12px;
border:1px solid var(--border);
background:var(--bg-surface);
color:var(--text-primary);
font-size:13.5px;
outline:none;
resize:vertical;
font-family:inherit;
}
.reply-form-row{
display:flex;
justify-content:space-between;
align-items:center;
gap:10px;
}
.reply-submit-btn{
background:var(--accent);
color:white;
border:none;
padding:8px 16px;
border-radius:999px;
font-size:12.5px;
font-weight:700;
}

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

let supabase = null;
if(!CONFIG_IS_PLACEHOLDER){
  supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const THEME_KEY = 'viewpoint-theme';

let state = {
  topics: [],
  loading: true,
  setupNeeded: false,
  loadError: false,
  filter: 'home',
  search: '',
  route: { view:'home', id:null },
  detailOpinions: [],
  detailOpinionsTopicId: null, // which topic's opinions are currently loaded into detailOpinions
  repliesByOpinion: {},   // opinionId -> array of replies, loaded alongside detailOpinions
  openRepliesFor: new Set(),  // opinion ids whose reply thread is currently expanded

};

function formatK(n){
  if(n >= 1000) return (n/1000).toFixed(n % 1000 === 0 ? 0 : 1) + 'K';
  return String(n);
}

function timeAgo(ts){
  const s = Math.floor((Date.now()-ts)/1000);
  if(s < 60) return 'just now';
  const m = Math.floor(s/60); if(m < 60) return m+' min ago';
  const h = Math.floor(m/60); if(h < 24) return h+' hour'+(h>1?'s':'')+' ago';
  const d = Math.floor(h/24); if(d < 30) return d+' day'+(d>1?'s':'')+' ago';
  return new Date(ts).toLocaleDateString(undefined,{month:'short',day:'numeric'});
}

function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str || '';
  return d.innerHTML;
}

/**
 * Renders the "⋯" dropdown menu on a topic/opinion card.
 * - Owners see Edit (topics only, opinions aren't editable) + Delete.
 * - Everyone signed in sees Report.
 * menuId:      unique id so we know which dropdown is open
 * kind:        'topic' | 'opinion'
 * targetId:    id of the topic/opinion this menu belongs to
 * isOwner:     whether the current user owns this content
 * label:       human label for the delete confirm text, e.g. "topic" / "debate" / "opinion"
 */
function renderMenu(menuId, kind, targetId, isOwner, label){
  const open = state.openMenuFor === menuId;
  const deleteAttr = kind === 'topic' ? 'delete-topic' : 'delete-opinion';
  const items = [];
  if(isOwner && kind === 'topic'){
    items.push(`<button class="menu-item" data-edit-topic="${targetId}">✏️ Edit ${label}</button>`);
  }
  if(state.user){
    items.push(`<button class="menu-item" data-report="${kind}:${targetId}">🚩 Report</button>`);
  }
  if(isOwner){
    items.push(`<button class="menu-item danger" data-${deleteAttr}="${targetId}">🗑 Delete ${label}</button>`);
  }
  if(!items.length) return '';
  return `
    <div class="menu-wrap">
      <button class="menu-btn" data-menu-toggle="${menuId}" aria-label="More options">⋯</button>
      <div class="menu-dropdown ${open ? 'open':''}">
        ${items.join('')}
      </div>
    </div>
  `;
}

/* ---------- generic local storage helpers ---------- */

function storageGet(key){
  try{
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : null;
  }catch(e){ return null; }
}
function storageSet(key, value){
  try{ localStorage.setItem(key, JSON.stringify(value)); }catch(e){}
}

/* ---------- theme (dark mode) ---------- */

function initTheme(){
  let theme = null;
  try{ theme = localStorage.getItem(THEME_KEY); }catch(e){}
  // First-ever visit (nothing saved yet): always start in light mode,
  // regardless of the visitor's system/browser dark-mode preference.
  if(!theme){
    theme = 'light';
  }
  applyTheme(theme);
}
function applyTheme(theme){
  document.documentElement.setAttribute('data-theme', theme);
  try{ localStorage.setItem(THEME_KEY, theme); }catch(e){}
}
function toggleTheme(){
  const current = document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
  applyTheme(current === 'dark' ? 'light' : 'dark');
  renderHeader();
}

/* ---------- auth ---------- */

function displayName(){
  if(!state.profile) return 'Anonymous';
  return state.profile.display_name || 'Anonymous';
}

async function signInWithGoogle(){
  if(!supabase) return;
  await supabase.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.href }
  });
}

/**
 * Lets a signed-in user switch to a different Google account without a
 * separate manual "sign out, then sign in again" step. `prompt: select_account`
 * tells Google to show the account chooser (including "Use another account")
 * even if the browser already has a Google session — instead of silently
 * re-using whichever account is currently active.
 */
async function switchAccount(){
  if(!supabase) return;
  state.userMenuOpen = false;
  await supabase.auth.signInWithOAuth({
    provider: 'google',
    options: {
      redirectTo: window.location.href,
      queryParams: { prompt: 'select_account' }
    }
  });
}

async function signOut(){
  if(!supabase) return;
  await supabase.auth.signOut();
  state.user = null;
  state.profile = null;
  state.votedTopicIds = new Set();
  state.votedOpinionIds = new Set();
  state.notifications = [];
  state.unreadCount = 0;
  state.userMenuOpen = false;
  render();
}

/** Creates/updates the profiles row for the signed-in user so we have a stable display name + avatar to show under posts. */
async function upsertProfile(user){
  const meta = user.user_metadata || {};
  const profileRow = {
    id: user.id,
    display_name: meta.full_name || meta.name || (user.email ? user.email.split('@')[0] : 'Anonymous'),
    avatar_url: meta.avatar_url || meta.picture || null,
    email: user.email || null,
  };
  try{
    const { data, error } = await supabase.from('profiles').upsert(profileRow).select().single();
    if(error) throw error;
    state.profile = data;
  }catch(e){
    console.error('Failed to upsert profile:', e);
    state.profile = profileRow; // fall back to what we have locally
  }
}

async function loadUserVotes(){
  if(!state.user) return;
  try{
    const { data: tv } = await supabase.from('topic_votes').select('topic_id').eq('voter_id', state.user.id);
    state.votedTopicIds = new Set((tv||[]).map(r=>r.topic_id));
  }catch(e){ console.error('Failed to load topic votes:', e); }
}

async function loadUserOpinionVotes(opinionIds){
  if(!state.user || !opinionIds.length){ state.votedOpinionIds = new Set(); return; }
  try{
    const { data } = await supabase.from('opinion_votes').select('opinion_id').eq('voter_id', state.user.id).in('opinion_id', opinionIds);
    state.votedOpinionIds = new Set((data||[]).map(r=>r.opinion_id));
  }catch(e){ console.error('Failed to load opinion votes:', e); }
}

function requireLogin(action){
  if(state.user) return true;
  showConfirm(`You need to sign in with Google to ${action}.`, 'Sign in', () => signInWithGoogle());
  return false;
}

/* ---------- notifications ---------- */

async function loadNotifications(){
  if(!state.user) return;
  try{
    const { data, error } = await supabase.from('notifications')
      .select('*')
      .eq('recipient_id', state.user.id)
      .order('created_at', { ascending:false })
      .limit(30);
    if(error) throw error;
    state.notifications = data || [];
    state.unreadCount = state.notifications.filter(n=>!n.is_read).length;
  }catch(e){
    console.error('Failed to load notifications:', e);
  }
}

async function markNotificationRead(id){
  const n = state.notifications.find(x=>x.id===id);
  if(!n || n.is_read) return;
  n.is_read = true;
  state.unreadCount = Math.max(0, state.unreadCount - 1);
  renderHeader();
  try{
    await supabase.from('notifications').update({ is_read:true }).eq('id', id);
  }catch(e){ console.error('Failed to mark notification read:', e); }
}

async function markAllNotificationsRead(){
  const hadUnread = state.notifications.some(n=>!n.is_read);
  state.notifications.forEach(n=>n.is_read = true);
  state.unreadCount = 0;
  renderHeader();
  if(!hadUnread || !state.user) return;
  try{
    await supabase.from('notifications').update({ is_read:true }).eq('recipient_id', state.user.id).eq('is_read', false);
  }catch(e){ console.error('Failed to mark all notifications read:', e); }
}

function notifText(n){
  const actor = escapeHtml(n.actor_name || 'Someone');
  if(n.type === 'reply'){
    return `<strong>${actor}</strong> replied to your ${escapeHtml(n.context_label||'topic')}: "${escapeHtml((n.message||'').slice(0,80))}"`;
  }
  if(n.type === 'reply_to_opinion'){
    return `<strong>${actor}</strong> replied to your opinion: "${escapeHtml((n.message||'').slice(0,80))}"`;
  }
  if(n.type === 'mention'){
    return `<strong>${actor}</strong> tagged you in a ${escapeHtml(n.context_label||'reply')}: "${escapeHtml((n.message||'').slice(0,80))}"`;
  }
  return escapeHtml(n.message || 'You have a new notification.');
}

/* ---------- @mention tagging ---------- */

// Selections the user has picked from the autocomplete dropdown, keyed by
// the textarea's element id (e.g. "opText" or "replyText-<opinionId>").
let mentionSelections = {};

/** Looks up users by display name for the @mention autocomplete dropdown. */
async function searchProfilesForMention(query){
  if(!supabase || !query) return [];
  try{
    const { data, error } = await supabase.from('profiles')
      .select('id,display_name,avatar_url')
      .ilike('display_name', `%${query}%`)
      .limit(6);
    if(error) throw error;
    return data || [];
  }catch(e){
    console.error('Failed to search profiles for mention:', e);
    return [];
  }
}

/**
 * Renders posted text with any "@Name" mentions highlighted. This is a
 * cosmetic pattern-match (it doesn't re-verify the name is a real user) so
 * it can't fully replace copyright-safe rendering rules, but it's fine for
 * highlighting plain user-authored text.
 */
function renderMentionText(text){
  const escaped = escapeHtml(text);
  return escaped.replace(/@([A-Za-z0-9_]+(?:\s[A-Za-z0-9_]+){0,2})(?=[\s.,!?;:()]|$)/g, (m, name) => `<span class="mention-tag">@${name}</span>`);
}

/** Notifies every user tagged with @ in a just-posted opinion/reply. */
async function notifyMentions(key, text, contextLabel, topicId){
  const mentions = mentionSelections[key] || [];
  mentionSelections[key] = [];
  if(!mentions.length || !state.user) return;
  const rows = mentions
    .filter(m => m.id !== state.user.id) // don't notify yourself
    .map(m => ({
      recipient_id: m.id,
      actor_id: state.user.id,
      actor_name: displayName(),
      type: 'mention',
      message: text.slice(0,80),
      context_label: contextLabel,
      topic_id: topicId,
      is_read: false,
    }));
  if(!rows.length) return;
  try{
    const { error } = await supabase.from('notifications').insert(rows);
    if(error) throw error;
  }catch(e){
    console.error('Failed to notify mentioned users:', e);
  }
}

/** Wires up @mention autocomplete on every textarea with class "mention-input" in the current render. */
function bindMentionInputs(){
  const dropdown = document.getElementById('mentionDropdown');
  if(!dropdown) return;
  document.querySelectorAll('textarea.mention-input').forEach(ta => {
    let debounceTimer = null;
    const hide = () => { dropdown.style.display = 'none'; };

    ta.addEventListener('input', () => {
      const key = ta.id;
      const val = ta.value;
      const pos = ta.selectionStart;
      const upToCursor = val.slice(0, pos);
      const match = upToCursor.match(/@([A-Za-z0-9_' -]{1,30})$/);
      if(!match){ hide(); return; }
      const query = match[1].trim();
      clearTimeout(debounceTimer);
      if(!query){ hide(); return; }
      debounceTimer = setTimeout(async () => {
        const results = await searchProfilesForMention(query);
        if(!results.length){ hide(); return; }
        const rect = ta.getBoundingClientRect();
        dropdown.style.left = Math.round(rect.left) + 'px';
        dropdown.style.top = Math.round(rect.bottom + 4) + 'px';
        dropdown.style.width = Math.min(Math.max(rect.width, 180), 280) + 'px';
        dropdown.innerHTML = results.map(p=>`<div class="mention-suggestion" data-id="${p.id}" data-name="${escapeHtml(p.display_name)}">${escapeHtml(p.display_name)}</div>`).join('');
        dropdown.style.display = 'block';
        dropdown.querySelectorAll('.mention-suggestion').forEach(item=>{
          item.onmousedown = (e) => {
            e.preventDefault();
            const id = item.dataset.id, name = item.dataset.name;
            const before = val.slice(0, pos - query.length - 1);
            const after = val.slice(pos);
            ta.value = `${before}@${name} ${after}`;
            if(!mentionSelections[key]) mentionSelections[key] = [];
            if(!mentionSelections[key].find(m=>m.id===id)) mentionSelections[key].push({id, name});
            hide();
            ta.focus();
          };
        });
      }, 200);
    });

    ta.addEventListener('blur', () => { setTimeout(hide, 150); });
  });
}

/* ---------- Supabase data layer ---------- */

function mapTopicRow(row){
  return {
    id: row.id,
    title: row.title,
    description: row.description,
    tag: row.tag,
    author: row.author,
    userId: row.user_id,
    type: row.type,
    sideLabels: row.side_labels,
    createdAt: new Date(row.created_at).getTime(),
    stats: {
      opinionCount: row.opinion_count,
      voteCount: row.vote_count,
      sideAVotes: row.side_a_votes,
      sideBVotes: row.side_b_votes,
      topicVotes: row.topic_votes,
    }
  };
}

function mapOpinionRow(row){
  return {
    id: row.id,
    text: row.text,
    author: row.author,
    userId: row.user_id,
    side: row.side,
    votes: row.votes,
    createdAt: new Date(row.created_at).getTime(),
  };
}

function mapReplyRow(row){
  return {
    id: row.id,
    opinionId: row.opinion_id,
    text: row.text,
    author: row.author,
    userId: row.user_id,
    createdAt: new Date(row.created_at).getTime(),
  };
}

async function loadTopics(){
  try{
    const { data, error } = await supabase.from('topics').select('*').order('created_at', { ascending:false });
    if(error) throw error;
    state.topics = data.map(mapTopicRow);
    state.loadError = false;
  }catch(e){
    console.error('Failed to load topics:', e);
    state.topics = [];
    state.loadError = true;
  }
  await loadUserVotes();
}

async function loadOpinions(topicId){
  try{
    const { data, error } = await supabase.from('opinions').select('*').eq('topic_id', topicId).order('created_at', { ascending:false });
    if(error) throw error;
    state.detailOpinions = data.map(mapOpinionRow);
  }catch(e){
    console.error('Failed to load opinions:', e);
    state.detailOpinions = [];
  }
  await loadUserOpinionVotes(state.detailOpinions.map(o=>o.id));
  await loadReplies(state.detailOpinions.map(o=>o.id));
}

/** Batch-loads every reply for the currently loaded opinions in one query. */
async function loadReplies(opinionIds){
  state.repliesByOpinion = {};
  if(!opinionIds.length) return;
  try{
    const { data, error } = await supabase.from('opinion_replies')
      .select('*')
      .in('opinion_id', opinionIds)
      .order('created_at', { ascending: true });
    if(error) throw error;
    (data || []).forEach(row => {
      const reply = mapReplyRow(row);
      if(!state.repliesByOpinion[reply.opinionId]) state.repliesByOpinion[reply.opinionId] = [];
      state.repliesByOpinion[reply.opinionId].push(reply);
    });
  }catch(e){
    console.error('Failed to load replies:', e);
  }
}

function ensureStats(t){
  t.stats = t.stats || { opinionCount:0, voteCount:0, sideAVotes:0, sideBVotes:0, topicVotes:0 };
  if(t.stats.topicVotes === undefined) t.stats.topicVotes = 0;
  return t.stats;
}

/* ---------- Realtime sync ----------
   This is what actually keeps votes/opinions/replies/notifications in sync
   across everyone's browser at once, instead of only updating the person
   who clicked and requiring everyone else to refresh the page to see it.
   Requires Realtime to be turned on for these tables in Supabase — see the
   SQL setup notes. */

let topicsChannel = null, opinionsChannel = null, repliesChannel = null, notifChannel = null;

function setupRealtime(){
  if(!supabase || topicsChannel) return; // only ever set up once

  // Any topic/debate's aggregate vote counts, opinion counts, edits, or
  // deletions — from ANY user — get pushed here live.
  topicsChannel = supabase.channel('sync-topics')
    .on('postgres_changes', { event:'*', schema:'public', table:'topics' }, (payload) => {
      if(payload.eventType === 'DELETE'){
        const deletedId = payload.old.id;
        state.topics = state.topics.filter(t=>t.id!==deletedId);
        if(state.route.view==='detail' && state.route.id===deletedId){
          state.route = { view:'home', id:null };
        }
      } else {
        const mapped = mapTopicRow(payload.new);
        const idx = state.topics.findIndex(t=>t.id===mapped.id);
        if(idx===-1) state.topics.unshift(mapped);
        else state.topics[idx] = mapped;
      }
      render();
    })
    .subscribe();

  // Opinion/argument votes and new opinions, scoped to whichever topic is
  // currently open.
  opinionsChannel = supabase.channel('sync-opinions')
    .on('postgres_changes', { event:'*', schema:'public', table:'opinions' }, (payload) => {
      if(state.route.view !== 'detail') return;
      const row = payload.new || payload.old;
      if(!row || row.topic_id !== state.route.id) return;
      if(payload.eventType === 'DELETE'){
        state.detailOpinions = state.detailOpinions.filter(o=>o.id!==payload.old.id);
      } else {
        const mapped = mapOpinionRow(payload.new);
        const idx = state.detailOpinions.findIndex(o=>o.id===mapped.id);
        if(idx===-1) state.detailOpinions.push(mapped);
        else state.detailOpinions[idx] = mapped;
      }
      render();
    })
    .subscribe();

  // New replies (or reply deletions) on any opinion belonging to the topic
  // currently open.
  repliesChannel = supabase.channel('sync-replies')
    .on('postgres_changes', { event:'*', schema:'public', table:'opinion_replies' }, (payload) => {
      if(state.route.view !== 'detail') return;
      const row = payload.new || payload.old;
      if(!row) return;
      const opinionId = row.opinion_id;
      if(!state.detailOpinions.find(o=>o.id===opinionId)) return; // not part of the open topic
      if(payload.eventType === 'DELETE'){
        const list = state.repliesByOpinion[opinionId] || [];
        state.repliesByOpinion[opinionId] = list.filter(r=>r.id!==payload.old.id);
      } else {
        const reply = mapReplyRow(payload.new);
        if(!state.repliesByOpinion[opinionId]) state.repliesByOpinion[opinionId] = [];
        const list = state.repliesByOpinion[opinionId];
        const idx = list.findIndex(r=>r.id===reply.id);
        if(idx===-1) list.push(reply); else list[idx] = reply;
      }
      render();
    })
    .subscribe();
}

/** (Re)subscribes to just-for-me notification pushes whenever the signed-in user changes. */
function setupNotificationRealtime(){
  if(notifChannel){ supabase.removeChannel(notifChannel); notifChannel = null; }
  if(!supabase || !state.user) return;
  notifChannel = supabase.channel('sync-notifs-'+state.user.id)
    .on('postgres_changes', { event:'INSERT', schema:'public', table:'notifications', filter:`recipient_id=eq.${state.user.id}` }, (payload) => {
      state.notifications.unshift(payload.new);
      state.unreadCount += 1;
      renderHeader();
    })
    .subscribe();
}

/* ---------- Render ---------- */

async function render(){
  const root = document.getElementById('root');
  renderHeader();

  if(state.setupNeeded){
    root.innerHTML = `
      <div class="wrapper"><div class="empty-state" style="grid-column:1/-1;text-align:left;max-width:640px;margin:40px auto;">
        <div class="big">🔧</div>
        <strong>Supabase isn't connected yet.</strong><br><br>
        Open this HTML file, find the <code>SUPABASE_URL</code> and <code>SUPABASE_ANON_KEY</code> constants
        near the top of the &lt;script&gt; tag, and paste in your project's real values.
        You'll find them in the Supabase dashboard under Project Settings → API.
      </div></div>`;
    return;
  }

  if(state.loading){
    root.innerHTML = `<div class="wrapper"><div class="empty-state" style="grid-column:1/-1;"><div class="big">🌿</div>Loading…</div></div>`;
    return;
  }

  if(state.loadError){
    root.innerHTML = `
      <div class="wrapper"><div class="empty-state" style="grid-column:1/-1;text-align:left;max-width:640px;margin:40px auto;">
        <div class="big">⚠️</div>
        <strong>Couldn't reach Supabase.</strong><br><br>
        Double-check your <code>SUPABASE_URL</code>/<code>SUPABASE_ANON_KEY</code>, make sure you ran the schema
        SQL in the Supabase SQL editor, and check the browser console for the exact error.
      </div></div>`;
    return;
  }

  document.querySelectorAll('#navTabs button').forEach(b=>{
    b.classList.toggle('active', state.route.view==='home' && b.dataset.filter===state.filter);
  });
  if(state.route.view === 'home'){
    state.detailOpinionsTopicId = null;
    root.innerHTML = renderHome();
  } else {
    root.innerHTML = await renderDetail(state.route.id);
  }
  bindEvents();
}

/* ---------- header: theme toggle + notifications + auth ---------- */

function renderHeader(){
  const el = document.getElementById('headerRight');
  if(!el) return;
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';

  const themeBtn = `<button class="icon-btn" id="themeToggleBtn" aria-label="Toggle dark mode" title="Toggle dark mode">${isDark ? '☀️' : '🌙'}</button>`;

  let notifBtn = '';
  if(state.user){
    notifBtn = `
      <div class="notif-wrap">
        <button class="icon-btn" id="notifBtn" aria-label="Notifications">🔔${state.unreadCount>0 ? `<span class="notif-badge">${state.unreadCount>9?'9+':state.unreadCount}</span>`:''}</button>
        <div class="notif-dropdown ${state.notifOpen?'open':''}" id="notifDropdown">
          <div class="notif-head">
            <span>Notifications</span>
            <button id="markAllReadBtn">Mark all read</button>
          </div>
          ${ state.notifications.length ? state.notifications.map(n=>`
            <div class="notif-item ${n.is_read?'':'unread'}" data-notif="${n.id}" data-open-topic="${n.topic_id||''}">
              ${notifText(n)}
              <span class="notif-time">${timeAgo(new Date(n.created_at).getTime())}</span>
            </div>
          `).join('') : `<div class="notif-empty">No notifications yet.</div>` }
        </div>
      </div>
    `;
  }

  let authBtn;
  if(!state.authReady){
    authBtn = '';
  } else if(state.user){
    const av = state.profile && state.profile.avatar_url
      ? `<img class="avatar-img" src="${escapeHtml(state.profile.avatar_url)}" alt="">`
      : `<div class="avatar-fallback">${escapeHtml(displayName().slice(0,1).toUpperCase())}</div>`;
    authBtn = `
      <div class="auth-wrap">
        <button class="avatar-btn" id="userMenuBtn">${av}<span class="avatar-name">${escapeHtml(displayName())}</span></button>
        <div class="user-dropdown ${state.userMenuOpen?'open':''}" id="userDropdown">
          <div class="ud-info">
            <div class="ud-name">${escapeHtml(displayName())}</div>
            <div class="ud-email">${escapeHtml((state.profile && state.profile.email) || '')}</div>
          </div>
          <button class="menu-item" id="switchAccountBtn">🔁 Switch account</button>
          <button class="menu-item" id="signOutBtn">Sign out</button>
        </div>
      </div>
    `;
  } else {
    // Google OAuth handles new vs. returning accounts automatically, so both
    // buttons trigger the same flow — we just show both words since that's
    // what people expect to see and tap.
    authBtn = `
      <div class="auth-buttons">
        <button class="signin-btn" id="logInBtn">Log In</button>
        <button class="signin-btn primary" id="signInBtn">Sign In</button>
      </div>
    `;
  }

  el.innerHTML = `${themeBtn}${notifBtn}${authBtn}`;
  bindHeaderEvents();
}

function bindHeaderEvents(){
  const themeBtn = document.getElementById('themeToggleBtn');
  if(themeBtn) themeBtn.onclick = (e) => { e.stopPropagation(); toggleTheme(); };

  const notifBtn = document.getElementById('notifBtn');
  if(notifBtn) notifBtn.onclick = async (e) => {
    e.stopPropagation();
    state.notifOpen = !state.notifOpen;
    state.userMenuOpen = false;
    if(state.notifOpen) await loadNotifications();
    renderHeader();
  };
  document.querySelectorAll('[data-notif]').forEach(el=>{
    el.onclick = (e) => {
      e.stopPropagation();
      const id = el.dataset.notif;
      const topicId = el.dataset.openTopic;
      markNotificationRead(id);
      state.notifOpen = false;
      if(topicId){ state.route = { view:'detail', id: topicId }; render(); }
    };
  });
  const markAllBtn = document.getElementById('markAllReadBtn');
  if(markAllBtn) markAllBtn.onclick = (e) => { e.stopPropagation(); markAllNotificationsRead(); };

  const signInBtn = document.getElementById('signInBtn');
  if(signInBtn) signInBtn.onclick = () => signInWithGoogle();
  const logInBtn = document.getElementById('logInBtn');
  if(logInBtn) logInBtn.onclick = () => signInWithGoogle();

  const userMenuBtn = document.getElementById('userMenuBtn');
  if(userMenuBtn) userMenuBtn.onclick = (e) => {
    e.stopPropagation();
    state.userMenuOpen = !state.userMenuOpen;
    state.notifOpen = false;
    renderHeader();
  };
  const switchAccountBtn = document.getElementById('switchAccountBtn');
  if(switchAccountBtn) switchAccountBtn.onclick = (e) => { e.stopPropagation(); switchAccount(); };
  const signOutBtn = document.getElementById('signOutBtn');
  if(signOutBtn) signOutBtn.onclick = () => signOut();
}

// clicking anywhere else closes the notification / user dropdowns
document.addEventListener('click', () => {
  if(state.notifOpen || state.userMenuOpen){
    state.notifOpen = false;
    state.userMenuOpen = false;
    renderHeader();
  }
});

function trendingList(){
  return [...state.topics]
    .sort((a,b)=> ensureStats(b).voteCount - ensureStats(a).voteCount)
    .slice(0,6);
}

function renderSidebarRight(){
  const trending = trendingList();
  const items = trending.length
    ? trending.map(t => `<div class="trend" data-open="${t.id}"><span>${escapeHtml(t.title)}</span><span class="tvotes">▲ ${formatK(ensureStats(t).voteCount)}</span></div>`).join('')
    : `<div class="trend" style="color:#9AA39C;cursor:default;">Nothing trending yet</div>`;
  return `
    <div class="right">
      <h3>🌿 Trending</h3>
      ${items}
    </div>
  `;
}

function renderCard(t){
  const stats = ensureStats(t);
  const votedTopic = state.votedTopicIds.has(t.id);
  const mine = state.user && t.userId === state.user.id;
  const authorLine = `<div class="card-author">by ${escapeHtml(t.author || 'Anonymous')}</div>`;
  if(t.type === 'debate'){
    const total = stats.sideAVotes + stats.sideBVotes;
    const pctA = total ? Math.round((stats.sideAVotes/total)*100) : 50;
    const pctB = 100 - pctA;
    const labels = t.sideLabels || ['Side A','Side B'];
    return `
      <div class="card" data-open="${t.id}">
        <div class="card-top-row">
          <div class="title" style="margin-bottom:0;">${escapeHtml(t.title)}</div>
          ${renderMenu('card-'+t.id, 'topic', t.id, mine, 'debate')}
        </div>
        <div class="tag debate-tag" style="margin-bottom:10px;">⚔ ${escapeHtml(t.tag || 'Debate')}</div>
        ${authorLine}
        ${t.description ? `<div class="desc">${escapeHtml(t.description)}</div>` : ''}
        <div class="debate">
          <div class="side a">
            <div class="side-heading"><h3>${escapeHtml(labels[0])}</h3></div>
            <div class="progress"><div class="fill" style="width:${pctA}%"></div></div>
            <p style="margin-top:10px;color:var(--accent);font-weight:700;">${pctA}%</p>
          </div>
          <div class="side b">
            <div class="side-heading"><h3>${escapeHtml(labels[1])}</h3></div>
            <div class="progress"><div class="fill2" style="width:${pctB}%"></div></div>
            <p style="margin-top:10px;color:var(--accent-mid);font-weight:700;">${pctB}%</p>
          </div>
        </div>
        <div class="bottom" style="margin-top:20px;">
          <div class="stats">
            <span>💬 ${stats.opinionCount} Arguments</span>
            <span>🕒 ${timeAgo(t.createdAt)}</span>
          </div>
          <div style="display:flex;gap:8px;align-items:center;">
            <button class="vote-topic-btn ${votedTopic?'voted':''}" data-vote-topic="${t.id}" aria-label="${votedTopic?'Remove your vote for this debate':'Vote for this debate'}">▲ ${formatK(stats.topicVotes)}</button>
            <div class="vote">🗳 ${formatK(stats.voteCount)} from arguments</div>
          </div>
        </div>
      </div>
    `;
  }
  return `
    <div class="card" data-open="${t.id}">
      <div class="card-top-row">
        <div class="title" style="margin-bottom:0;">${escapeHtml(t.title)}</div>
        ${renderMenu('card-'+t.id, 'topic', t.id, mine, 'topic')}
      </div>
      <div class="tag" style="margin-bottom:10px;">${escapeHtml(t.tag || 'General')}</div>
      ${authorLine}
      ${t.description ? `<div class="desc">${escapeHtml(t.description)}</div>` : ''}
      <div class="bottom">
        <div class="stats">
          <span>💬 ${stats.opinionCount} Opinions</span>
          <span>🕒 ${timeAgo(t.createdAt)}</span>
        </div>
        <div style="display:flex;gap:8px;align-items:center;">
          <button class="vote-topic-btn ${votedTopic?'voted':''}" data-vote-topic="${t.id}" aria-label="${votedTopic?'Remove your vote for this topic':'Vote for this topic'}">▲ ${formatK(stats.topicVotes)}</button>
          <div class="vote">🗳 ${formatK(stats.voteCount)} from opinions</div>
        </div>
      </div>
    </div>
  `;
}

function renderHome(){
  let list = state.topics.slice();

  if(state.filter === 'trending'){
    list.sort((a,b)=> ensureStats(b).voteCount - ensureStats(a).voteCount);
  } else if(state.filter === 'home'){
    list.sort((a,b)=> b.createdAt - a.createdAt);
  } else {
    list = list.filter(t => t.type === state.filter);
    list.sort((a,b)=> b.createdAt - a.createdAt);
  }

  const q = state.search.trim().toLowerCase();
  if(q){
    list = list.filter(t =>
      t.title.toLowerCase().includes(q) ||
      (t.description||'').toLowerCase().includes(q) ||
      (t.tag||'').toLowerCase().includes(q)
    );
  }

  const emptyMsg = q
    ? `<div class="big">🔍</div>No results for "${escapeHtml(state.search)}"`
    : `<div class="big">🌿</div>Nothing here yet.<br>Be the first to open one.`;

  return `
    <div class="wrapper">
      <div class="sidebar">
        <h3>Create</h3>
        <button id="btnNewTopic">＋ New Topic</button>
        <button id="btnNewDebate" class="ghost">⚔ New Debate</button>
      </div>

      <div class="main-col">
        <div class="search">
          <input id="searchInput" placeholder="Search topics, debates or opinions..." value="${escapeHtml(state.search)}">
        </div>
        <div class="feed">
          ${ list.length ? list.map(renderCard).join('') : `<div class="empty-state">${emptyMsg}</div>` }
        </div>
      </div>

      ${renderSidebarRight()}
    </div>
  `;
}

async function renderDetail(id){
  const t = state.topics.find(x => x.id === id);
  if(!t){
    return `<div class="wrapper"><div class="empty-state" style="grid-column:1/-1;">That item isn't here anymore.</div></div>`;
  }
  // Only re-fetch from the database when we've switched to a different topic.
  // Re-fetching on every re-render (e.g. right after casting a vote) would
  // overwrite the optimistic local vote count with the not-yet-updated
  // server value, making votes appear to "not count."
  if(state.detailOpinionsTopicId !== id){
    await loadOpinions(id);
    state.detailOpinionsTopicId = id;
  }
  const stats = ensureStats(t);
  const isDebate = t.type === 'debate';
  const labels = t.sideLabels || ['Side A','Side B'];
  const mineTopic = state.user && t.userId === state.user.id;
  const topicMenu = `<div style="position:absolute;top:20px;right:20px;">${renderMenu('detail-'+t.id, 'topic', t.id, mineTopic, isDebate?'debate':'topic')}</div>`;
  const votedTopic = state.votedTopicIds.has(t.id);
  const topicVoteBtn = `<button class="vote-topic-btn ${votedTopic?'voted':''}" data-vote-topic="${t.id}" style="margin-top:16px;" aria-label="${votedTopic?'Remove your vote':'Vote for this '+(isDebate?'debate':'topic')}">▲ ${votedTopic?'Voted':'Vote for this '+(isDebate?'debate':'topic')} · ${formatK(stats.topicVotes)}</button>`;

  const opinionRow = (op, isTop) => {
    const voted = state.votedOpinionIds.has(op.id);
    const mineOp = state.user && op.userId === state.user.id;
    const replies = state.repliesByOpinion[op.id] || [];
    const repliesOpen = state.openRepliesFor.has(op.id);
    const replyLabel = replies.length ? `💬 ${replies.length} ${replies.length===1?'Reply':'Replies'}` : '💬 Reply';

    const replyItem = (r) => {
      const mineReply = state.user && r.userId === state.user.id;
      return `
        <div class="reply-item">
          <div class="reply-text">${renderMentionText(r.text)}</div>
          <div class="reply-meta">
            <span>${escapeHtml(r.author || 'Anonymous')} · ${timeAgo(r.createdAt)}</span>
            ${state.user ? `<button data-report-reply="${r.id}">Report</button>` : ''}
            ${mineReply ? `<button data-delete-reply="${r.id}:${op.id}">Delete</button>` : ''}
          </div>
        </div>
      `;
    };

    const replyForm = state.user ? `
      <div class="reply-form">
        <textarea id="replyText-${op.id}" class="mention-input" placeholder="Write a reply… (type @ to tag someone)"></textarea>
        <div class="reply-form-row">
          <span class="posting-as" style="margin:0;">Posting as ${escapeHtml(displayName())}</span>
          <button class="reply-submit-btn" data-submit-reply="${op.id}">Reply</button>
        </div>
      </div>
    ` : `<div class="reply-form"><span class="reply-signin-note">🔑 <a href="#" data-reply-signin="1" style="color:var(--accent);font-weight:700;">Sign in with Google</a> to reply.</span></div>`;

    return `
      <div class="opinion-item ${isTop ? 'top':''}">
        <div class="vote-col">
          <button class="vote-arrow ${voted?'voted':''}" data-vote="${op.id}" aria-label="${voted ? 'Remove your vote' : 'Upvote'}" title="${voted ? 'Click to remove your vote' : 'Upvote'}">▲</button>
          <div class="vote-count">${op.votes}</div>
        </div>
        <div style="flex:1;">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;">
            <div>${isTop ? `<div class="top-badge">TOP</div>` : ''}</div>
            ${renderMenu('opinion-'+op.id, 'opinion', op.id, mineOp, 'opinion')}
          </div>
          <div class="opinion-text">${renderMentionText(op.text)}</div>
          <div class="opinion-author">${escapeHtml(op.author || 'Anonymous')} · ${timeAgo(op.createdAt)}</div>
          <button class="reply-toggle" data-toggle-replies="${op.id}">${repliesOpen ? '▲ Hide' : replyLabel}</button>
          ${ repliesOpen ? `
            ${ replies.length ? `<div class="replies-wrap">${replies.map(replyItem).join('')}</div>` : '' }
            ${replyForm}
          ` : '' }
        </div>
      </div>
    `;
  };

  const postingAs = state.user
    ? `<div class="posting-as">Posting as <strong>${escapeHtml(displayName())}</strong></div>`
    : `<div class="auth-required-note">🔑 <a href="#" id="opFormSignIn" style="color:var(--accent);font-weight:700;">Sign in with Google</a> to post.</div>`;

  let body;
  if(isDebate){
    const opinions = [...state.detailOpinions];
    const sideA = opinions.filter(o=>o.side==='a').sort((a,b)=>b.votes-a.votes);
    const sideB = opinions.filter(o=>o.side==='b').sort((a,b)=>b.votes-a.votes);
    const total = stats.sideAVotes + stats.sideBVotes;
    const pctA = total ? Math.round((stats.sideAVotes/total)*100) : 50;
    const pctB = 100 - pctA;
    body = `
      <div class="detail-card" style="position:relative;">
        ${topicMenu}
        <div class="title">${escapeHtml(t.title)}</div>
        <div class="tag debate-tag" style="margin-bottom:10px;">⚔ ${escapeHtml(t.tag||'Debate')}</div>
        <div class="card-author">by ${escapeHtml(t.author || 'Anonymous')}</div>
        ${t.description ? `<div class="desc" style="margin-bottom:0;">${escapeHtml(t.description)}</div>` : ''}
        <div class="debate">
          <div class="side a">
            <div class="side-heading"><h3>${escapeHtml(labels[0])}</h3><span class="side-pct">${pctA}%</span></div>
            <div class="progress"><div class="fill" style="width:${pctA}%"></div></div>
          </div>
          <div class="side b">
            <div class="side-heading"><h3>${escapeHtml(labels[1])}</h3><span class="side-pct">${pctB}%</span></div>
            <div class="progress"><div class="fill2" style="width:${pctB}%"></div></div>
          </div>
        </div>
        <div class="detail-meta">
          <span>💬 ${stats.opinionCount} arguments</span>
          <span>▲ ${formatK(stats.voteCount)} votes total</span>
          <span>🕒 opened ${timeAgo(t.createdAt)}</span>
        </div>
        ${topicVoteBtn}
      </div>

      <div class="opinion-form">
        <h4>Add your argument</h4>
        ${postingAs}
        <textarea id="opText" class="mention-input" placeholder="Make your case… (type @ to tag someone)"></textarea>
        <div class="opinion-form-row">
          <select id="opSide">
            <option value="a">${escapeHtml(labels[0])}</option>
            <option value="b">${escapeHtml(labels[1])}</option>
          </select>
          <button class="post-btn" id="submitOpinion">Post Argument</button>
        </div>
      </div>

      <div class="opinions-grid">
        <div class="opinions-col">
          ${ sideA.length ? sideA.map((o,i)=>opinionRow(o, i===0)).join('') : `<div class="empty-state">No arguments for ${escapeHtml(labels[0])} yet.</div>` }
        </div>
        <div class="opinions-col">
          ${ sideB.length ? sideB.map((o,i)=>opinionRow(o, i===0)).join('') : `<div class="empty-state">No arguments for ${escapeHtml(labels[1])} yet.</div>` }
        </div>
      </div>
    `;
  } else {
    const opinions = [...state.detailOpinions].sort((a,b)=>b.votes-a.votes);
    body = `
      <div class="detail-card" style="position:relative;">
        ${topicMenu}
        <div class="title">${escapeHtml(t.title)}</div>
        <div class="tag" style="margin-bottom:10px;">${escapeHtml(t.tag||'General')}</div>
        <div class="card-author">by ${escapeHtml(t.author || 'Anonymous')}</div>
        ${t.description ? `<div class="desc" style="margin-bottom:0;">${escapeHtml(t.description)}</div>` : ''}
        <div class="detail-meta">
          <span>💬 ${stats.opinionCount} opinions</span>
          <span>▲ ${formatK(stats.voteCount)} votes total</span>
          <span>🕒 opened ${timeAgo(t.createdAt)}</span>
        </div>
        ${topicVoteBtn}
      </div>

      <div class="opinion-form">
        <h4>Add your opinion</h4>
        ${postingAs}
        <textarea id="opText" class="mention-input" placeholder="What do you think? (type @ to tag someone)"></textarea>
        <div class="opinion-form-row">
          <button class="post-btn" id="submitOpinion">Post Opinion</button>
        </div>
      </div>

      <div class="opinions-col">
        ${ opinions.length ? opinions.map((o,i)=>opinionRow(o, i===0)).join('') : `<div class="empty-state">No opinions yet. Add the first one above.</div>` }
      </div>
    `;
  }

  return `
    <div class="wrapper" style="grid-template-columns:1fr;max-width:820px;">
      <div>
        <button class="back-btn" id="backHome">← Back to Viewpoint</button>
        ${body}
      </div>
    </div>
  `;
}

function bindEvents(){
  const logo = document.getElementById('logoHome');
  if(logo) logo.onclick = () => { state.route={view:'home',id:null}; render(); };

  document.querySelectorAll('#navTabs button').forEach(b=>{
    b.onclick = () => {
      state.filter = b.dataset.filter;
      state.route = { view:'home', id:null };
      render();
    };
  });

  const back = document.getElementById('backHome');
  if(back) back.onclick = () => { state.route={view:'home',id:null}; render(); };

  document.querySelectorAll('[data-open]').forEach(el=>{
    el.onclick = () => { state.route = { view:'detail', id: el.dataset.open }; render(); };
  });

  const search = document.getElementById('searchInput');
  if(search){
    search.oninput = () => { state.search = search.value; renderInPlace(); };
  }

  const btnT = document.getElementById('btnNewTopic');
  if(btnT) btnT.onclick = () => { if(requireLogin('open a new topic')) openNewModal('topic'); };
  const btnD = document.getElementById('btnNewDebate');
  if(btnD) btnD.onclick = () => { if(requireLogin('open a new debate')) openNewModal('debate'); };

  const submitBtn = document.getElementById('submitOpinion');
  if(submitBtn) submitBtn.onclick = submitOpinion;

  const opFormSignIn = document.getElementById('opFormSignIn');
  if(opFormSignIn) opFormSignIn.onclick = (e) => { e.preventDefault(); signInWithGoogle(); };

  document.querySelectorAll('[data-vote]').forEach(el=>{
    el.onclick = () => castVote(el.dataset.vote);
  });

  document.querySelectorAll('[data-vote-topic]').forEach(el=>{
    el.onclick = (e) => { e.stopPropagation(); toggleTopicVote(el.dataset.voteTopic); };
  });

  document.querySelectorAll('[data-menu-toggle]').forEach(el=>{
    el.onclick = (e) => {
      e.stopPropagation();
      const id = el.dataset.menuToggle;
      state.openMenuFor = (state.openMenuFor === id) ? null : id;
      render();
    };
  });

  document.querySelectorAll('[data-delete-topic]').forEach(el=>{
    el.onclick = (e) => { e.stopPropagation(); deleteTopic(el.dataset.deleteTopic); };
  });

  document.querySelectorAll('[data-delete-opinion]').forEach(el=>{
    el.onclick = (e) => { e.stopPropagation(); deleteOpinion(el.dataset.deleteOpinion); };
  });

  document.querySelectorAll('[data-edit-topic]').forEach(el=>{
    el.onclick = (e) => {
      e.stopPropagation();
      state.openMenuFor = null;
      const t = state.topics.find(x=>x.id===el.dataset.editTopic);
      if(t) openEditModal(t);
    };
  });

  document.querySelectorAll('[data-report]').forEach(el=>{
    el.onclick = (e) => {
      e.stopPropagation();
      state.openMenuFor = null;
      const [kind, targetId] = el.dataset.report.split(':');
      openReportModal(kind, targetId);
    };
  });

  document.querySelectorAll('[data-toggle-replies]').forEach(el=>{
    el.onclick = (e) => {
      e.stopPropagation();
      const id = el.dataset.toggleReplies;
      if(state.openRepliesFor.has(id)) state.openRepliesFor.delete(id);
      else state.openRepliesFor.add(id);
      render();
    };
  });

  document.querySelectorAll('[data-submit-reply]').forEach(el=>{
    el.onclick = (e) => { e.stopPropagation(); submitReply(el.dataset.submitReply); };
  });

  document.querySelectorAll('[data-delete-reply]').forEach(el=>{
    el.onclick = (e) => {
      e.stopPropagation();
      const [replyId, opinionId] = el.dataset.deleteReply.split(':');
      deleteReply(replyId, opinionId);
    };
  });

  document.querySelectorAll('[data-report-reply]').forEach(el=>{
    el.onclick = (e) => { e.stopPropagation(); openReportModal('reply', el.dataset.reportReply); };
  });

  document.querySelectorAll('[data-reply-signin]').forEach(el=>{
    el.onclick = (e) => { e.preventDefault(); e.stopPropagation(); signInWithGoogle(); };
  });

  bindMentionInputs();
}

function renderInPlace(){
  const root = document.getElementById('root');
  root.innerHTML = renderHome();
  bindEvents();
  const search = document.getElementById('searchInput');
  if(search){
    search.focus();
    search.setSelectionRange(search.value.length, search.value.length);
  }
}

let isSubmittingOpinion = false;
async function submitOpinion(){
  if(isSubmittingOpinion) return;
  if(!requireLogin('post')) return;
  const t = state.topics.find(x=>x.id===state.route.id);
  const textEl = document.getElementById('opText');
  const sideEl = document.getElementById('opSide');
  const text = textEl.value.trim();
  if(!text) return;
  isSubmittingOpinion = true;
  const submitBtn = document.getElementById('submitOpinion');
  if(submitBtn){ submitBtn.disabled = true; submitBtn.style.opacity = '0.6'; }

  const opRow = {
    topic_id: t.id,
    text,
    author: displayName(),
    user_id: state.user.id,
    side: t.type==='debate' ? (sideEl ? sideEl.value : 'a') : null,
  };

  try{
    const { data, error } = await supabase.from('opinions').insert(opRow).select().single();
    if(error) throw error;
    const op = mapOpinionRow(data);
    state.detailOpinions.push(op);

    const stats = ensureStats(t);
    stats.opinionCount += 1;
    await supabase.rpc('increment_opinion_count', { p_topic_id: t.id });
    await notifyMentions('opText', text, t.type==='debate' ? 'argument' : 'opinion', t.id);
  }catch(e){
    console.error('Failed to post opinion:', e);
    alert("Couldn't post that — check your Supabase setup/connection and try again.");
  }

  isSubmittingOpinion = false;
  render();
}

function showConfirm(message, confirmLabel, onConfirm){
  const wrap = document.createElement('div');
  wrap.className = 'overlay';
  wrap.innerHTML = `
    <div class="modal" style="max-width:380px;">
      <h2 style="font-size:18px;">Are you sure?</h2>
      <p style="color:#66736A;font-size:14px;line-height:1.6;">${escapeHtml(message)}</p>
      <div class="modal-foot">
        <button class="cancel-btn" id="confirmCancelBtn">Cancel</button>
        <button class="post-btn" id="confirmOkBtn" style="background:#B8503F;">${escapeHtml(confirmLabel)}</button>
      </div>
    </div>
  `;
  document.body.appendChild(wrap);
  document.getElementById('confirmCancelBtn').onclick = () => wrap.remove();
  wrap.onclick = (e) => { if(e.target===wrap) wrap.remove(); };
  document.getElementById('confirmOkBtn').onclick = () => {
    wrap.remove();
    onConfirm();
  };
}

function deleteOpinion(opinionId){
  const t = state.topics.find(x=>x.id===state.route.id);
  if(!t) return;
  const idx = state.detailOpinions.findIndex(o=>o.id===opinionId);
  if(idx===-1) return;

  showConfirm("Delete this opinion? This can't be undone.", 'Delete', async () => {
    const i = state.detailOpinions.findIndex(o=>o.id===opinionId);
    if(i===-1) return;
    const op = state.detailOpinions[i];
    state.detailOpinions.splice(i,1);

    const stats = ensureStats(t);
    stats.opinionCount = Math.max(0, stats.opinionCount - 1);
    stats.voteCount = Math.max(0, stats.voteCount - op.votes);
    if(t.type==='debate'){
      if(op.side==='a') stats.sideAVotes = Math.max(0, stats.sideAVotes - op.votes);
      else stats.sideBVotes = Math.max(0, stats.sideBVotes - op.votes);
    }

    state.votedOpinionIds.delete(opinionId);
    state.openMenuFor = null;
    render();

    try{
      // RLS only allows this to succeed if the current user owns the row.
      const { error } = await supabase.from('opinions').delete().eq('id', opinionId);
      if(error) throw error;
      await supabase.rpc('increment_opinion_count', { p_topic_id: t.id, p_delta: -1 }).catch(()=>{});
    }catch(e){
      console.error('Failed to delete opinion on server:', e);
    }
  });
}

let isSubmittingReply = false;

async function submitReply(opinionId){
  if(isSubmittingReply) return;
  if(!requireLogin('reply')) return;
  const textEl = document.getElementById('replyText-'+opinionId);
  if(!textEl) return;
  const text = textEl.value.trim();
  if(!text) return;
  isSubmittingReply = true;
  const btn = document.querySelector(`[data-submit-reply="${opinionId}"]`);
  if(btn){ btn.disabled = true; btn.style.opacity = '0.6'; }

  const replyRow = {
    opinion_id: opinionId,
    text,
    author: displayName(),
    user_id: state.user.id,
  };

  try{
    const { data, error } = await supabase.from('opinion_replies').insert(replyRow).select().single();
    if(error) throw error;
    const reply = mapReplyRow(data);
    if(!state.repliesByOpinion[opinionId]) state.repliesByOpinion[opinionId] = [];
    state.repliesByOpinion[opinionId].push(reply);
    state.openRepliesFor.add(opinionId);
    const t = state.topics.find(x=>x.id===state.route.id);
    await notifyMentions('replyText-'+opinionId, text, 'reply', t ? t.id : null);
  }catch(e){
    console.error('Failed to post reply:', e);
    alert("Couldn't post that reply — check your connection and try again.");
  }

  isSubmittingReply = false;
  render();
}

function deleteReply(replyId, opinionId){
  showConfirm("Delete this reply? This can't be undone.", 'Delete', async () => {
    const list = state.repliesByOpinion[opinionId] || [];
    const idx = list.findIndex(r=>r.id===replyId);
    if(idx !== -1) list.splice(idx, 1);
    render();

    try{
      // RLS only allows this to succeed if the current user owns the row.
      const { error } = await supabase.from('opinion_replies').delete().eq('id', replyId);
      if(error) throw error;
    }catch(e){
      console.error('Failed to delete reply on server:', e);
    }
  });
}

function deleteTopic(topicId){
  const t = state.topics.find(x=>x.id===topicId);
  const label = t && t.type==='debate' ? 'debate' : 'topic';

  showConfirm(`Delete this ${label} and all its opinions? This can't be undone.`, 'Delete', async () => {
    state.topics = state.topics.filter(x=>x.id!==topicId);
    state.openMenuFor = null;

    if(state.route.view==='detail' && state.route.id===topicId){
      state.route = { view:'home', id:null };
    }
    render();

    try{
      // RLS only allows this to succeed if the current user owns the row.
      // Opinions/votes/notifications referencing this topic are removed via ON DELETE CASCADE.
      const { error } = await supabase.from('topics').delete().eq('id', topicId);
      if(error) throw error;
    }catch(e){
      console.error('Failed to delete on server:', e);
    }
  });
}

async function castVote(opinionId){
  if(!requireLogin('vote')) return;
  const op = state.detailOpinions.find(o=>o.id===opinionId);
  if(!op) return;
  const t = state.topics.find(x=>x.id===state.route.id);
  const stats = ensureStats(t);
  const alreadyVoted = state.votedOpinionIds.has(opinionId);

  // Write to the database FIRST, then update local counts from the result —
  // this is the fix for votes drifting out of sync: the old code updated the
  // on-screen count before knowing whether the write actually happened,
  // which could show a vote that never made it into the shared database
  // (so other people never saw it, and it could vanish on refresh).
  try{
    if(alreadyVoted){
      const { error } = await supabase.from('opinion_votes').delete().eq('voter_id', state.user.id).eq('opinion_id', opinionId);
      if(error) throw error;
      state.votedOpinionIds.delete(opinionId);
      op.votes = Math.max(0, op.votes - 1);
      stats.voteCount = Math.max(0, stats.voteCount - 1);
      if(t.type==='debate'){
        if(op.side==='a') stats.sideAVotes = Math.max(0, stats.sideAVotes - 1);
        else stats.sideBVotes = Math.max(0, stats.sideBVotes - 1);
      }
      await supabase.rpc('vote_opinion', { p_opinion_id: opinionId, p_delta: -1 });
    } else {
      const { error } = await supabase.from('opinion_votes').insert({ voter_id: state.user.id, opinion_id: opinionId });
      if(error && error.code === '23505'){
        // The database says this account already voted (e.g. from another
        // tab or device) — one account, one vote — so just match that,
        // without double-counting the aggregate.
        state.votedOpinionIds.add(opinionId);
        render();
        return;
      }
      if(error) throw error;
      state.votedOpinionIds.add(opinionId);
      op.votes += 1;
      stats.voteCount += 1;
      if(t.type==='debate'){
        if(op.side==='a') stats.sideAVotes += 1; else stats.sideBVotes += 1;
      }
      await supabase.rpc('vote_opinion', { p_opinion_id: opinionId, p_delta: 1 });
    }
  }catch(e){
    console.error('Failed to save vote:', e);
  }
  render();
}

async function toggleTopicVote(topicId){
  if(!requireLogin('vote')) return;
  const t = state.topics.find(x=>x.id===topicId);
  if(!t) return;
  const stats = ensureStats(t);
  const alreadyVoted = state.votedTopicIds.has(topicId);

  try{
    if(alreadyVoted){
      const { error } = await supabase.from('topic_votes').delete().eq('voter_id', state.user.id).eq('topic_id', topicId);
      if(error) throw error;
      state.votedTopicIds.delete(topicId);
      stats.topicVotes = Math.max(0, stats.topicVotes - 1);
      await supabase.rpc('vote_topic', { p_topic_id: topicId, p_delta: -1 });
    } else {
      const { error } = await supabase.from('topic_votes').insert({ voter_id: state.user.id, topic_id: topicId });
      if(error && error.code === '23505'){
        state.votedTopicIds.add(topicId);
        render();
        return;
      }
      if(error) throw error;
      state.votedTopicIds.add(topicId);
      stats.topicVotes += 1;
      await supabase.rpc('vote_topic', { p_topic_id: topicId, p_delta: 1 });
    }
  }catch(e){
    console.error('Failed to save topic vote:', e);
  }
  render();
}

function openNewModal(defaultType){

      <label>Title</label>
      <input type="text" id="newTitle" placeholder="Enter a clear, specific title">
      <label>Description (optional)</label>

      <div id="sideLabelsBlock" style="display:none;">

      </div>

        <button class="post-btn" id="confirmNew">Open it</button>
      </div>
    </div>
  `;
  document.body.appendChild(wrap);

  let pickedType = defaultType;
  const syncTypeButtons = () => {
    wrap.querySelectorAll('[data-type]').forEach(b=>{
      b.classList.toggle('picked', b.dataset.type===pickedType);
    });
    document.getElementById('sideLabelsBlock').style.display = pickedType==='debate' ? 'block' : 'none';
  };
  wrap.querySelectorAll('[data-type]').forEach(btn=>{
    btn.onclick = () => { pickedType = btn.dataset.type; syncTypeButtons(); };
  });
  syncTypeButtons();

  document.getElementById('cancelNew').onclick = () => wrap.remove();
  wrap.onclick = (e) => { if(e.target===wrap) wrap.remove(); };

  const confirmBtn = document.getElementById('confirmNew');
  confirmBtn.onclick = async () => {
    if(confirmBtn.disabled) return;
    if(!requireLogin('open a new topic')) return;
    const title = document.getElementById('newTitle').value.trim();
    if(!title) return;
    confirmBtn.disabled = true;
    confirmBtn.style.opacity = '0.6';

      author: displayName(),

      type: pickedType,
      side_labels: null,
    };
    if(pickedType==='debate'){
      const a = document.getElementById('sideALabel').value.trim() || 'Side A';
      const b = document.getElementById('sideBLabel').value.trim() || 'Side B';
      topicRow.side_labels = [a,b];
    }

    try{
      const { data, error } = await supabase.from('topics').insert(topicRow).select().single();
      if(error) throw error;
      const topic = mapTopicRow(data);
      state.topics.unshift(topic);
      state.route = { view:'detail', id: topic.id };
    }catch(e){
      console.error('Failed to create topic/debate:', e);
      alert("Couldn't create that — check your Supabase setup/connection and try again.");
    } finally {
      wrap.remove();
    }
    render();
  };
}

/** Edit modal for an existing topic/debate — owner only (also enforced server-side by RLS). */
function openEditModal(topic){

  const labels = topic.sideLabels || ['Side A','Side B'];
  const wrap = document.createElement('div');
  wrap.className = 'overlay';

      <h2>Edit ${isDebate ? 'debate' : 'topic'}</h2>

      <input type="text" id="editTag" value="${escapeHtml(topic.tag||'')}" placeholder="e.g. Politics, Technology">

      <input type="text" id="editTitle" value="${escapeHtml(topic.title)}" placeholder="Enter a clear, specific title">
      <label>Description (optional)</label>
      <textarea id="editDesc" placeholder="Add context for this discussion (optional)">${escapeHtml(topic.description||'')}</textarea>
      ${ isDebate ? `
      <label>Side labels</label>
      <div class="side-labels-row">
        <input type="text" id="editSideA" value="${escapeHtml(labels[0])}">
        <input type="text" id="editSideB" value="${escapeHtml(labels[1])}">
      </div>` : '' }

        <button class="post-btn" id="confirmEdit">Save changes</button>
      </div>
    </div>
  `;
