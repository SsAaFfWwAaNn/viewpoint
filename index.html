  document.getElementById('cancelEdit').onclick = () => wrap.remove();
  wrap.onclick = (e) => { if(e.target===wrap) wrap.remove(); };

  const confirmBtn = document.getElementById('confirmEdit');
  confirmBtn.onclick = async () => {
    if(confirmBtn.disabled) return;
    const title = document.getElementById('editTitle').value.trim();
    if(!title) return;
    confirmBtn.disabled = true;
    confirmBtn.style.opacity = '0.6';
    confirmBtn.textContent = 'Saving…';

    const updateRow = {
      title,
      description: document.getElementById('editDesc').value.trim(),
      tag: document.getElementById('editTag').value.trim(),
    };
    if(isDebate){
      const a = document.getElementById('editSideA').value.trim() || 'Side A';
      const b = document.getElementById('editSideB').value.trim() || 'Side B';
      updateRow.side_labels = [a,b];
    }

    try{
      // RLS only allows this to succeed if the current user owns the row.
      const { data, error } = await supabase.from('topics').update(updateRow).eq('id', topic.id).select().single();
      if(error) throw error;
      const updated = mapTopicRow(data);
      const idx = state.topics.findIndex(x=>x.id===topic.id);
      if(idx !== -1) state.topics[idx] = updated;
    }catch(e){
      console.error('Failed to update topic:', e);
      alert("Couldn't save your changes — check your connection and try again.");
    } finally {
      wrap.remove();
    }
    render();
  };
}

/** Report modal — logged-in users can flag a topic or opinion for moderation. */
function openReportModal(kind, targetId){
  if(!requireLogin('report content')) return;
  const wrap = document.createElement('div');
  wrap.className = 'overlay';
  wrap.innerHTML = `
    <div class="modal" style="max-width:420px;">
      <h2>Report ${kind === 'topic' ? 'this post' : kind === 'reply' ? 'this reply' : 'this opinion'}</h2>
      <label>Reason</label>
      <select id="reportReason">
        <option value="spam">Spam or advertising</option>
        <option value="harassment">Harassment or hate speech</option>
        <option value="misinformation">Misinformation</option>
        <option value="inappropriate">Inappropriate content</option>
        <option value="other">Other</option>
      </select>
      <label>Additional details (optional)</label>
      <textarea id="reportDetails" placeholder="Anything else moderators should know?"></textarea>
      <div class="modal-foot">
        <button class="cancel-btn" id="cancelReport">Cancel</button>
        <button class="post-btn" id="confirmReport" style="background:var(--danger);">Submit report</button>
      </div>
    </div>
  `;
  document.body.appendChild(wrap);
  document.getElementById('cancelReport').onclick = () => wrap.remove();
  wrap.onclick = (e) => { if(e.target===wrap) wrap.remove(); };

  const confirmBtn = document.getElementById('confirmReport');
  confirmBtn.onclick = async () => {
    if(confirmBtn.disabled) return;
    confirmBtn.disabled = true;
    confirmBtn.style.opacity = '0.6';
    confirmBtn.textContent = 'Submitting…';

    const reportRow = {
      target_type: kind,
      target_id: targetId,
      reporter_id: state.user.id,
      reason: document.getElementById('reportReason').value,
      details: document.getElementById('reportDetails').value.trim(),
    };

    try{
      const { error } = await supabase.from('reports').insert(reportRow);
      if(error) throw error;
      wrap.remove();
      showConfirm("Thanks — our moderators will take a look. No further action needed from you.", 'OK', ()=>{});
    }catch(e){
      console.error('Failed to submit report:', e);
      alert("Couldn't submit the report — check your connection and try again.");
      wrap.remove();
    }
  };
}

document.addEventListener('click', () => {
  if(state.openMenuFor !== null){
    state.openMenuFor = null;
    render();
  }
});

async function init(){
  initTheme();

  if(CONFIG_IS_PLACEHOLDER){
    state.setupNeeded = true;
    state.loading = false;
    render();
    return;
  }

  // Listen for auth changes (sign in, sign out, token refresh, and the
  // redirect back from Google) and keep our local state in sync.
  supabase.auth.onAuthStateChange(async (event, session) => {
    const newUser = session ? session.user : null;
    const userChanged = (newUser?.id || null) !== (state.user?.id || null);
    state.user = newUser;
    state.authReady = true;
    if(newUser && userChanged){
      await upsertProfile(newUser);
      await loadUserVotes();
      await loadNotifications();
      setupNotificationRealtime();
    } else if(!newUser){
      state.profile = null;
      state.votedTopicIds = new Set();
      state.votedOpinionIds = new Set();
      state.notifications = [];
      state.unreadCount = 0;
      setupNotificationRealtime();
    }
    if(!state.loading) render();
  });

  const { data: { session } } = await supabase.auth.getSession();
  state.user = session ? session.user : null;
  state.authReady = true;
  if(state.user){
    await upsertProfile(state.user);
    await loadNotifications();
    setupNotificationRealtime();
  }

  await loadTopics();
  setupRealtime();
  state.loading = false;
  render();
}
init();

</script>
